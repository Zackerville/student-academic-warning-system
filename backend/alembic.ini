[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# URL được override bởi migrations/env.py (đọc từ app settings)
sqlalchemy.url = postgresql+asyncpg://warning_user:warning_password@localhost:5432/warning_ai_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S